<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN - DNA | Responsive Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-light: #F4F6F9; }
        
        body { margin:0; font-family: 'Poppins', sans-serif; background: transparent; }

        /* RESPONSIVE CONTAINER */
        .container { 
            width: 95%; 
            max-width: 800px; 
            margin: auto; 
            text-align: center; 
            padding-top: 10px; 
        }
        
        h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--zen-blue); 
            margin: 0 0 15px 0; 
            font-size: clamp(1.2rem, 5vw, 1.6rem); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        
        .title-wrap { position: relative; margin-bottom: 25px; }
        .title-wrap::after { 
            content: ''; 
            display: block; 
            width: 40px; 
            height: 3px; 
            background: var(--zen-maroon); 
            margin: 8px auto; 
        }

        /* SLIDER ADJUSTMENTS */
        .slider-frame { 
            overflow: hidden; 
            position: relative; 
            border-radius: 20px; 
            background: #fff; 
            box-shadow: 0 10px 25px rgba(35, 54, 93, 0.12); 
            cursor: grab; 
        }

        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        
        /* RESPONSIVE SLIDE WIDTH */
        .slide { 
            min-width: 100%; 
            box-sizing: border-box; 
        }

        /* Responsive Grid for Desktop (If showing multiple cards) */
        @media (min-width: 768px) {
            .slide { min-width: 50%; } /* Shows 2 cards on desktop if you adjust track logic */
        }

        .card { text-align: left; background: #fff; position: relative; height: 100%; }

        /* IMAGE BOX RESPONSIVENESS */
        .img-box { 
            height: 210px; 
            position: relative; 
            background: #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        @media (max-width: 480px) {
            .img-box { height: 180px; }
        }

        .bg-blur { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: blur(12px); opacity: 0.4; z-index: 1; }
        .main-img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 2; display: none; }
        .main-img.active { display: block; }

        .maroon-line { height: 4px; background: var(--zen-maroon); width: 100%; }

        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.25); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); font-weight: bold; }

        .type-badge { position: absolute; top: 12px; left: 12px; background: rgba(255, 255, 255, 0.9); color: var(--zen-blue); padding: 4px 10px; font-size: 9px; font-weight: 700; border-radius: 50px; text-transform: uppercase; z-index: 5; }
        
        .timer-badge { 
            position: absolute; top: 12px; right: 12px; background: var(--zen-blue); 
            color: #fff; padding: 4px 10px; font-size: 9px; font-weight: 600; 
            border-radius: 6px; z-index: 5; display: flex; align-items: center; gap: 5px; 
        }

        .content { padding: clamp(12px, 4vw, 18px); }
        .title { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 4vw, 1.1rem); font-weight: bold; color: var(--zen-blue); margin-bottom: 8px; line-height: 1.2; }
        .desc { font-size: clamp(10px, 3vw, 11px); color: #444; margin-bottom: 12px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .details { font-size: 10px; color: #555; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .details i { color: var(--zen-gold); width: 14px; text-align: center; }

        .btn-wrap { margin-top: 15px; padding-bottom: 15px; }
        .btn-wrap a { background: var(--zen-blue); color: #fff; padding: 8px 20px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 600; transition: 0.3s; display: inline-block; }
        
        .skeleton { height: 380px; background: #eee; border-radius: 20px; }
        .live-text { color: #ff3b30; font-weight: 800; animation: blink 1s infinite; display: flex; align-items: center; gap: 4px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="title-wrap">
        <h2><i class="fa-solid fa-calendar-check"></i> Upcoming Events</h2>
    </div>
    
    <div id="loader" class="skeleton"></div>
    <div class="slider-frame" id="slider-frame" style="display:none;">
        <div class="slider-track" id="track"></div>
    </div>
    <div class="btn-wrap">
        <a href="https://azbtweb.wixsite.com/zen-dna/events" target="_blank">Events Portal <i class="fa-solid fa-arrow-right"></i></a>
    </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxf_ijaWN5lfKCdAcRtyE9B_ahp7ta8YFhIqIVylNQmZXZpaVfeD7MZbPntZeS92IrXPCDLf0aB7my/pub?gid=0&single=true&output=csv";

// Logic to handle window resizing for slider calculations
let slideWidth = 0;

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
    const headers = lines[0].split(',').map(h => h.trim());
    return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        let obj = {};
        headers.forEach((h, i) => {
            let val = values[i] ? values[i].replace(/"/g,"").trim() : "";
            obj[h] = (val === "" || val.toLowerCase() === "null") ? null : val;
        });
        return obj;
    });
}

function parseDateTime(d, t, isEnd = false) {
    if(!d) return null;
    let timeStr = t ? t.trim() : (isEnd ? "23:59" : "00:00");
    if (timeStr.length <= 2) timeStr = timeStr.padStart(2, '0') + ":00";
    const p = d.split("-");
    const dateObj = new Date(`${p[2]}-${p[1]}-${p[0]}T${timeStr}:00`);
    return isNaN(dateObj.getTime()) ? null : dateObj;
}

function getDriveImg(url) {
    if(!url) return ""; 
    const match = url.match(/[-\w]{25,}/);
    return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=w800` : url;
}

function updateTimerHtml(start, end) {
    if(!start) return "<i class='fa-solid fa-clock'></i> Upcoming";
    const now = new Date();
    if(start <= now && (!end || now <= end)) return "<span class='live-text'><i class='fa-solid fa-circle'></i> LIVE</span>";
    const diff = start - now;
    if(diff < 0) return "Started";
    const diffInDays = diff / (1000 * 60 * 60 * 24);
    if (diffInDays >= 2) return `<i class="fa-solid fa-calendar"></i> In ${Math.floor(diffInDays)} days`;
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    return `<i class="fa-solid fa-hourglass-half"></i> ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

async function init() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const data = parseCSV(text);
        const track = document.getElementById("track");
        const frame = document.getElementById("slider-frame");
        const now = new Date();

        let events = data.map(e => {
            const start = parseDateTime(e.Date, e.Start_Time, false);
            const endDateString = e.End_date || e.Date;
            const end = parseDateTime(endDateString, e.End_Time, true);
            return { ...e, start, end };
        })
        .filter(e => e.start && (e.end ? e.end >= now : e.start >= (now - 3600000)))
        .sort((a,b) => a.start - b.start);

        document.getElementById("loader").style.display = "none";
        frame.style.display = "block";

        if (events.length === 0) {
            frame.innerHTML = `<div class="no-events"><i class="fa-regular fa-calendar-xmark"></i> No upcoming events.</div>`;
            return;
        }

        events.forEach((e, cardIdx) => {
            const imgLinks = (e.Invitation_Link || "").split("|").map(s => s.trim()).filter(s => s !== "");
            const images = imgLinks.map(link => getDriveImg(link));
            const safeID = (e.Event_ID || "evt"+cardIdx).replace(/[^a-zA-Z0-9]/g, "-");

            const slide = document.createElement("div");
            slide.className = "slide";
            slide.innerHTML = `
                <div class="card">
                    <div class="img-box">
                        ${e.Event_Type ? `<div class="type-badge"><i class="fa-solid fa-tag"></i> ${e.Event_Type}</div>` : ''}
                        <div class="timer-badge" id="timer-${safeID}">--</div>
                        ${images.map((img, i) => `
                            <img src="${img}" class="bg-blur" style="display:${i===0?'block':'none'}">
                            <img src="${img}" class="main-img ${i===0?'active':''}" onerror="this.src='https://via.placeholder.com/400x210?text=ZEN+DNA'">
                        `).join("")}
                        ${images.length > 1 ? `
                            <button class="nav-arrow arrow-left" onclick="event.stopPropagation(); changeInnerImg(${cardIdx}, -1)"><i class="fa-solid fa-chevron-left"></i></button>
                            <button class="nav-arrow arrow-right" onclick="event.stopPropagation(); changeInnerImg(${cardIdx}, 1)"><i class="fa-solid fa-chevron-right"></i></button>
                        ` : ''}
                    </div>
                    <div class="maroon-line"></div>
                    <div class="content">
                        <div class="title">${e.Event_Name || 'Event Update'}</div>
                        <div class="desc">${e.Description || ''}</div>
                        <div class="details"><i class="fa-solid fa-calendar-day"></i><span>${e.Date}</span></div>
                        <div class="details"><i class="fa-solid fa-clock"></i><span>${e.Start_Time || '--'}</span></div>
                        <div class="details"><i class="fa-solid fa-location-dot"></i><span>${e.Venue || 'TBA'}</span></div>
                    </div>
                </div>`;
            track.appendChild(slide);
        });

        initSliderLogic(events.length);

        setInterval(() => {
            events.forEach((e, idx) => {
                const sID = (e.Event_ID || "evt"+idx).replace(/[^a-zA-Z0-9]/g, "-");
                const badge = document.getElementById("timer-" + sID);
                if(badge) badge.innerHTML = updateTimerHtml(e.start, e.end);
            });
        }, 1000);

    } catch (err) { console.error(err); }
}

function initSliderLogic(count) {
    const frame = document.getElementById("slider-frame");
    const track = document.getElementById("track");
    let currentIndex = 0;

    function updateWidth() { slideWidth = frame.offsetWidth; moveToIndex(currentIndex); }
    window.addEventListener('resize', updateWidth);
    updateWidth();

    function moveToIndex(idx) {
        currentIndex = idx;
        track.style.transform = `translateX(${-currentIndex * slideWidth}px)`;
    }

    // Auto-slide logic
    setInterval(() => { currentIndex = (currentIndex + 1) % count; moveToIndex(currentIndex); }, 8000);
}

window.changeInnerImg = function(cardIdx, dir) {
    const slides = document.querySelectorAll('.slide');
    const imgs = slides[cardIdx].querySelectorAll('.main-img');
    const blurs = slides[cardIdx].querySelectorAll('.bg-blur');
    let current = Array.from(imgs).findIndex(img => img.classList.contains('active'));
    imgs[current].classList.remove('active');
    blurs[current].style.display = 'none';
    let next = (current + dir + imgs.length) % imgs.length;
    imgs[next].classList.add('active');
    blurs[next].style.display = 'block';
};

init();
</script>
</body>
</html>
