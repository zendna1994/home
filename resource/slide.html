<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN-DNA | Resource of the Week</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-light: #F4F6F9; }
        
        body { margin: 0; background: transparent; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }

        .container { width: 100%; max-width: 350px; margin: 0 auto; text-align: center; padding: 10px 5px; }
        
        h2 { font-family: 'Playfair Display', serif; color: var(--zen-blue); margin: 0 0 15px 0; font-size: 1.6rem; }
        h2::after { content: ''; display: block; width: 40px; height: 3px; background: var(--zen-maroon); margin: 8px auto; }

        .card { 
            background: #fff; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(35, 54, 93, 0.12); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative; cursor: pointer;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(35, 54, 93, 0.2); }

        .img-box { height: 210px; position: relative; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .bg-blur { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: blur(12px); opacity: 0.4; z-index: 1; }
        .main-img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 2; display: none; }
        .main-img.active { display: block; }

        .maroon-line { height: 4px; background: var(--zen-maroon); width: 100%; flex-shrink: 0; }

        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.25); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); font-weight: bold; pointer-events: auto; }
        .arrow-left { left: 10px; } .arrow-right { right: 10px; }

        .week-badge { position: absolute; top: 12px; left: 12px; background: var(--zen-gold); color: var(--zen-blue); padding: 4px 12px; font-size: 10px; font-weight: 700; border-radius: 50px; z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.2); text-align: left; line-height: 1.2; }
        .week-date { font-size: 8px; display: block; opacity: 0.9; font-weight: 500; }
        .watermark { position: absolute; bottom: 8px; right: 12px; font-size: 9px; color: rgba(255,255,255,0.6); z-index: 5; letter-spacing: 1px; font-weight: 600; }

        .content { padding: 18px; text-align: left; flex-grow: 1; }
        .category-tag { font-size: 10px; font-weight: 700; color: var(--zen-maroon); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .res-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: bold; color: var(--zen-blue); margin-bottom: 8px; line-height: 1.2; }
        
        .res-description { font-size: 11.5px; color: #444; margin-bottom: 15px; line-height: 1.5; word-wrap: break-word; }

        .btn-link { display: block; text-decoration: none; background: var(--zen-blue); color: #fff; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 600; text-align: center; transition: 0.3s; margin-top: auto; }
        .btn-link:hover { background: var(--zen-maroon); }

        .portal-wrap { margin-top: 15px; padding-bottom: 20px; }
        .portal-btn { display: inline-block; text-decoration: none; color: var(--zen-blue); font-size: 12px; font-weight: 600; padding: 8px 16px; border: 1.5px solid var(--zen-blue); border-radius: 8px; transition: 0.3s; }
        .portal-btn:hover { background: var(--zen-blue); color: #fff; }

        .skeleton { height: 450px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Resource of the Week</h2>
    <div id="zen-display">
        <div class="skeleton"></div>
    </div>
    <div class="portal-wrap">
        <a href="https://azbtweb.wixsite.com/zen-dna/resources" target="_blank" class="portal-btn">Resource Portal →</a>
    </div>
</div>

<script>
const resourceSheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS3Z3advl1GATBHih2oijmHQec-dtTUM1QtYX4mhsyTXWMymV2_zb74Dfusy_P6Ga4YeGGAeG5num2n/pub?gid=0&single=true&output=csv";
const calendarSheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS3Z3advl1GATBHih2oijmHQec-dtTUM1QtYX4mhsyTXWMymV2_zb74Dfusy_P6Ga4YeGGAeG5num2n/pub?gid=1198422437&single=true&output=csv";

function parseCSVData(text) {
    const rows = text.trim().split("\n");
    const headers = rows[0].split(",").map(h => h.trim());
    return rows.slice(1).map(row => {
        const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        let obj = {};
        headers.forEach((h, i) => {
            obj[h] = values[i] ? values[i].replace(/^"|"$/g, "").trim() : "";
        });
        return obj;
    });
}

function getDriveImg(url) {
    if(!url) return "";
    const match = url.match(/[-\w]{25,}/);
    return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=w800` : url;
}

async function loadZENResource() {
    try {
        const [resResource, resCalendar] = await Promise.all([fetch(resourceSheetURL), fetch(calendarSheetURL)]);
        const resources = parseCSVData(await resResource.text());
        const calendars = parseCSVData(await resCalendar.text());

        const today = new Date();
        const dateString = today.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

        // 1. FIND ACTIVE ACADEMIC YEAR (Logic: starts today or before, but is the closest to today)
        const activeYearConfig = calendars
            .map(c => {
                const [d, m, y] = c["Start Date"].split("-");
                return { ...c, startDateObj: new Date(`${y}-${m}-${d}`) };
            })
            .filter(c => c.startDateObj <= today)
            .sort((a, b) => b.startDateObj - a.startDateObj)[0];

        if (!activeYearConfig) throw "No active academic year configuration found.";

        const currentYearCode = activeYearConfig["Year Code"];
        const startDate = activeYearConfig.startDateObj;

        // 2. CALCULATE CURRENT WEEK NUMBER
        const diffTime = Math.abs(today - startDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const currentWeekNum = Math.ceil(diffDays / 7);
        const targetWeekID = "R" + currentYearCode + "/" + String(currentWeekNum).padStart(3, '0');

        // 3. FILTER RESOURCES FOR ACTIVE YEAR ONLY
        const currentYearResources = resources.filter(r => r["Resource ID"].includes("R" + currentYearCode));
        if (currentYearResources.length === 0) throw "No resources entered for current year code: " + currentYearCode;

        // 4. FIND EXACT WEEK OR FALLBACK TO LATEST AVAILABLE IN ACTIVE YEAR
        let activeResource = currentYearResources.find(r => r["Resource ID"] === targetWeekID);
        if (!activeResource) {
            activeResource = currentYearResources[currentYearResources.length - 1];
        }

        const imgLinks = (activeResource["Image URL"] || "").split("|").map(s => s.trim()).filter(s => s !== "");
        const images = imgLinks.map(link => getDriveImg(link));
        const hasMultiple = images.length > 1;

        document.getElementById("zen-display").innerHTML = `
            <div class="card">
                <div class="img-box">
                    <div class="week-badge">
                        WEEK ${currentWeekNum}
                        <span class="week-date">${dateString}</span>
                    </div>
                    ${images.map((img, i) => `
                        <img src="${img}" class="bg-blur" style="display:${i===0?'block':'none'}">
                        <img src="${img}" class="main-img ${i===0?'active':''}" onerror="this.src='https://via.placeholder.com/400x210?text=ZEN+Resource'">
                    `).join("")}
                    ${hasMultiple ? `
                        <button class="nav-arrow arrow-left" onclick="event.stopPropagation(); changeInnerImg(-1)">❮</button>
                        <button class="nav-arrow arrow-right" onclick="event.stopPropagation(); changeInnerImg(1)">❯</button>
                    ` : ''}
                    <div class="watermark">ZEN - DNA</div>
                </div>
                
                <div class="maroon-line"></div>

                <div class="content">
                    <div class="category-tag">${activeResource["Category"]}</div>
                    <div class="res-title">${activeResource["Title"]}</div>
                    <div class="res-description">${activeResource["Description"]}</div>
                    <a href="${activeResource["Link"]}" target="_blank" class="btn-link">Resource →</a>
                </div>
            </div>
        `;
    } catch (err) {
        document.getElementById("zen-display").innerHTML = `<div style="padding:20px; color:#999;">${err}</div>`;
    }
}

window.changeInnerImg = function(dir) {
    const container = document.querySelector('.img-box');
    const imgs = container.querySelectorAll('.main-img');
    const blurs = container.querySelectorAll('.bg-blur');
    let current = Array.from(imgs).findIndex(img => img.classList.contains('active'));
    
    imgs[current].classList.remove('active');
    blurs[current].style.display = 'none';
    
    let next = (current + dir + imgs.length) % imgs.length;
    imgs[next].classList.add('active');
    blurs[next].style.display = 'block';
};

loadZENResource();
</script>
</body>
</html>
