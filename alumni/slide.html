<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN - DNA | Alumni Spotlight</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-light: #F4F6F9; }

body { font-family: 'Poppins', sans-serif; background: transparent; margin: 0; padding: 0; overflow-x: hidden; }

/* ADJUSTABLE CONTAINER */
.container { 
    width: 95%; 
    max-width: 500px; /* Increased max-width for better desktop viewing */
    margin: 10px auto; 
    text-align: center; 
}

h2 { font-family: 'Playfair Display', serif; color: var(--zen-blue); margin: 0 0 15px 0; font-size: clamp(1.2rem, 5vw, 1.8rem); }
h2::after { content: ''; display: block; width: 40px; height: 3px; background: var(--zen-maroon); margin: 8px auto; }

/* SLIDER */
.slider { overflow: hidden; position: relative; border-radius: 20px; background: #fff; box-shadow: 0 10px 25px rgba(35,54,93,0.12); cursor: grab; width: 100%; }
.track { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
.card { min-width: 100%; text-align: left; box-sizing: border-box; }

/* RESPONSIVE IMAGE BOX */
.img-box { 
    height: clamp(180px, 50vw, 280px); /* Height scales with screen width */
    position: relative; 
    background: #1a1a1a; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}
.img-box .bg-blur { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: blur(12px); opacity: 0.4; z-index: 1; }
.img-box img.main-img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 2; }

/* BADGES */
.tag-badge { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); color: var(--zen-blue); padding: 4px 10px; font-size: clamp(8px, 2vw, 10px); font-weight: 600; border-radius: 50px; text-transform: uppercase; z-index: 5; }
.year-badge { position: absolute; top: 10px; right: 10px; background: var(--zen-maroon); color: #fff; padding: 4px 10px; font-size: clamp(8px, 2vw, 10px); font-weight: 700; border-radius: 6px; z-index: 5; }

/* CONTENT & RESPONSIVE FONTS */
.content { padding: clamp(12px, 4vw, 20px); border-top: 4px solid var(--zen-maroon); }
.title { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: bold; color: var(--zen-blue); margin-bottom: 2px; }
.career { font-size: clamp(9px, 2.5vw, 11px); font-weight: 600; color: var(--zen-gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.meta { font-size: clamp(9px, 2.2vw, 10px); color: #666; margin-bottom: 4px; line-height: 1.3; }
.desc { font-size: clamp(10px, 2.5vw, 12px); color: #444; line-height: 1.5; margin-top: 8px; height: auto; max-height: 50px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* ACTION ICONS */
.actions { display: flex; gap: 15px; border-top: 1px solid #eee; padding-top: 12px; margin-top: 10px; }
.action-btn { font-size: clamp(9px, 2.2vw, 11px); text-decoration: none; color: var(--zen-blue); font-weight: 600; display: flex; align-items: center; gap: 4px; }

/* DOTS */
.dots { position: absolute; bottom: 8px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 10; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: 0.3s; }
.dot.active { background: #fff; width: 12px; border-radius: 10px; }

/* LOADER */
#loading-box { height: 350px; background: #f0f0f0; border-radius: 20px; position: relative; }

.btn-wrap { margin-top: 15px; }
.btn-wrap a { background: var(--zen-blue); color: #fff; padding: 10px 22px; border-radius: 8px; text-decoration: none; font-size: clamp(11px, 3vw, 13px); font-weight: 600; transition: 0.3s; display: inline-block; }

/* MOBILE SPECIFIC TWEAK */
@media (max-width: 400px) {
    .container { width: 98%; }
    .content { padding: 12px; }
}
</style>
</head>
<body>

<div class="container">
  <h2>Alumni Spotlight</h2>
  <div id="loading-box"></div>
  <div class="slider" id="slider" style="display:none;">
    <div class="track" id="track"></div>
    <div class="dots" id="dots"></div>
  </div>
  <div class="btn-wrap">
    <a href="https://azbtweb.wixsite.com/zen-dna/alumni" target="_blank">Alumni Portal →</a>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHU-kKOA2WoCCeSAVZJ_GVoziAyKETXE59glo1GrOy2_hYLHaV_fQ4CWm0_SFWLZ3gt3e2TnkQX1Ad/pub?output=csv";

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    let obj = {};
    headers.forEach((h, i) => obj[h] = values[i] ? values[i].replace(/^"|"$/g, '').trim() : "");
    return obj;
  });
}

function getImageUrl(url) {
  if(!url) return "";
  const match = url.match(/[-\w]{25,}/);
  return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=w800` : url;
}

fetch(CSV_URL).then(res => res.text()).then(csv => {
  let data = parseCSV(csv);
  const track = document.getElementById("track");
  const dotsContainer = document.getElementById("dots");

  let alumni = data.sort((a, b) => (parseInt(b.Year) || 0) - (parseInt(a.Year) || 0)).slice(0, 10);

  document.getElementById("loading-box").style.display = "none";
  document.getElementById("slider").style.display = "block";

  alumni.forEach((item, idx) => {
    const dot = document.createElement("div");
    dot.className = `dot ${idx === 0 ? 'active' : ''}`;
    dotsContainer.appendChild(dot);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="img-box">
        <img src="${getImageUrl(item.Image_URL)}" class="bg-blur">
        <img src="${getImageUrl(item.Image_URL)}" class="main-img" onerror="this.src='https://via.placeholder.com/400x250?text=Profile+Image'">
        <div class="tag-badge">${item.Highlight_Tag || 'Alumni'}</div>
        <div class="year-badge">Class of ${item.Year}</div>
      </div>
      <div class="content">
        <div class="title">${item.Name}</div>
        <div class="career">${item.Current_Position} @ ${item.Organization}</div>
        <div class="meta">🎓 ${item.Degree} | 🪪 ${item.Register_No}</div>
        <div class="desc">${item.Description || ''}</div>
        <div class="actions">
           ${item.LinkedIn ? `<a href="${item.LinkedIn}" target="_blank" class="action-btn">🔗 LinkedIn</a>` : ''}
           ${item.Email ? `<a href="mailto:${item.Email}" class="action-btn">✉️ Email</a>` : ''}
        </div>
      </div>
    `;
    track.appendChild(card);
  });

  initSlider(alumni.length);
});

function initSlider(count) {
  const slider = document.getElementById("slider"), track = document.getElementById("track"), dots = document.querySelectorAll(".dot");
  let startX, curIdx = 0, isDragging = false;

  const move = (idx) => {
    curIdx = (idx + count) % count;
    track.style.transform = `translateX(-${curIdx * 100}%)`;
    dots.forEach((d, i) => d.className = `dot ${i === curIdx ? 'active' : ''}`);
  };

  let auto = setInterval(() => move(curIdx + 1), 5000);

  slider.onmousedown = slider.ontouchstart = (e) => {
    clearInterval(auto);
    isDragging = true;
    startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
  };

  window.onmouseup = window.ontouchend = (e) => {
    if(!isDragging) return;
    isDragging = false;
    let endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
    if(startX - endX > 40) move(curIdx + 1);
    else if(startX - endX < -40) move(curIdx - 1);
    auto = setInterval(() => move(curIdx + 1), 5000);
  };
}
</script>
</body>
</html>
