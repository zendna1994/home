<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZEN-DNA | Achievements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A;
            --zen-white: #FFFFFF; --zen-text: #2D2D2D;
        }

        body { margin: 0; background: transparent; font-family: 'Poppins', sans-serif; }

        .zen-section {
            background: var(--zen-white); border-top: 4px solid var(--zen-maroon);
            padding: 15px; width: 100%; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); border-radius: 15px; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        .zen-title {
            font-family: 'Playfair Display', serif; font-size: clamp(20px, 4vw, 24px);
            color: var(--zen-blue); margin-bottom: 15px; display: flex; align-items: center; 
            border-bottom: 1.5px solid #F0F0F0; padding-bottom: 10px;
        }
        .zen-title::before { content: "🏆"; margin-right: 12px; font-size: 22px; }

        .zen-container { height: 300px; overflow-y: auto; position: relative; }
        
        /* SKELETON LOADING */
        .skeleton { height: 80px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 10px; margin-bottom: 10px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .zen-container::-webkit-scrollbar { width: 5px; }
        .zen-container::-webkit-scrollbar-thumb { background: var(--zen-gold); border-radius: 10px; }

        .ach-item { padding: 15px 5px; border-bottom: 1px solid #F0F0F0; }
        .ach-info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

        .ach-date { font-size: 10px; font-weight: 700; background: var(--zen-blue); color: #fff; padding: 3px 10px; border-radius: 4px; }
        .ach-category { font-size: 10px; font-weight: 700; background: #E9ECEF; color: var(--zen-blue); padding: 3px 10px; border-radius: 4px; text-transform: uppercase; }

        .ach-heading { font-size: clamp(15px, 3.5vw, 17px); color: var(--zen-blue); font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
        .ach-desc { font-size: clamp(12.5px, 3vw, 13.5px); color: #555; line-height: 1.5; margin-bottom: 8px; }

        .ach-link { display: inline-flex; align-items: center; gap: 5px; background: var(--zen-blue); color: #fff; text-decoration: none; padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 500; transition: 0.3s; }
        .ach-link:hover { background: var(--zen-maroon); }

        .imp-ach-wrapper { background: #F4F6F9; border-radius: 10px; padding: 5px 12px; margin-bottom: 15px; border-left: 4px solid var(--zen-maroon); position: sticky; top: 0; z-index: 5; }

        /* NAV BUTTON */
        .zen-btn-wrap { margin-top: 15px; text-align: center; }
        .zen-btn { background: var(--zen-blue); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; display: inline-block; transition: 0.3s; }
        .zen-btn:hover { background: var(--zen-gold); color: var(--zen-blue); }

        @keyframes scrollAch { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .scroll-active { animation: scrollAch 50s linear infinite; }
        .ach-container:hover .scroll-active { animation-play-state: paused; }
    </style>
</head>
<body>

<div class="zen-section">
    <div class="zen-title">Achievements</div>
    <div class="zen-container" id="achViewport">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
    <div class="zen-btn-wrap">
        <a href="https://azbtweb.wixsite.com/zen-dna/achievements-portal" target="_blank" class="zen-btn">Achievements Portal →</a>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRE0SyRVHDG4GONvyRIZTrTtWDc80R2lw540xzUgG52rZ3UTMIkWMr2lPeJtqPqZvgNp6Z2pVyXbZiG/pub?output=csv";

function parseDate(d) {
    if(!d) return new Date(0);
    const [dd, mm, yyyy] = d.split("-");
    return new Date(yyyy, mm - 1, dd);
}

function formatDate(d) {
    return parseDate(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

function processText(text) {
    if (!text) return "";
    return text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
}

fetch(CSV_URL).then(res => res.text()).then(data => {
    const rows = data.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");
    const now = new Date();
    const viewport = document.getElementById("achViewport");
    viewport.innerHTML = '<div id="importantArea"></div><div id="normalArea"></div>';
    
    const impArea = document.getElementById("importantArea");
    const normArea = document.getElementById("normalArea");
    let achList = [];

    rows.forEach(row => {
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
        const [from, to, title, description, category, link, highlight] = cols;
        if (!from || !title) return;
        const fDate = parseDate(from);
        const tDate = to ? parseDate(to) : new Date(now.getFullYear() + 1, 0, 1);

        if (now >= fDate && now <= tDate) {
            achList.push({ from, fDate, title, description, category, link, isImp: highlight && highlight.toUpperCase() === "YES" });
        }
    });

    achList.sort((a, b) => b.fDate - a.fDate).forEach(info => {
        const item = document.createElement("div");
        item.className = "ach-item";
        item.innerHTML = `
            <div class="ach-info-row">
                <span class="ach-date">${formatDate(info.from)}</span>
                ${info.category ? `<span class="ach-category">${info.category}</span>` : ""}
            </div>
            <div class="ach-heading">${processText(info.title)}</div>
            <div class="ach-desc">${processText(info.description)}</div>
            ${info.link ? `<a class="ach-link" href="${info.link}" target="_blank">View Achievement 📎</a>` : ""}`;

        if (info.isImp) {
            const wrap = document.createElement("div"); wrap.className = "imp-ach-wrapper";
            wrap.appendChild(item); impArea.appendChild(wrap);
        } else { normArea.appendChild(item); }
    });

    setTimeout(() => {
        const area = document.getElementById("normalArea");
        if (area.offsetHeight > viewport.offsetHeight) {
            area.innerHTML += area.innerHTML;
            area.classList.add("scroll-active");
        }
    }, 400);
});
</script>
</body>
</html>
