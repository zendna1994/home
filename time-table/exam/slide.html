<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEN - DNA | Upcoming Exams</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --zen-blue: #23365D; 
            --zen-maroon: #6C232E; 
            --zen-gold: #D4A64A; 
            --zen-light: #F4F6F9; 
        }
        
        body { 
            margin: 0; background: transparent; font-family: 'Poppins', sans-serif; 
            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; 
        }

        .container { 
            width: 100%; max-width: 350px; margin: 0 auto; text-align: center; padding: 10px 5px; 
        }
        
        h2 { 
            font-family: 'Playfair Display', serif; color: var(--zen-blue); margin: 0 0 15px 0; font-size: 1.6rem; 
        }
        h2::after { 
            content: ''; display: block; width: 40px; height: 3px; background: var(--zen-maroon); margin: 8px auto; 
        }

        /* CAROUSEL */
        .carousel {
            width: 100%; position: relative; overflow: hidden; padding-bottom: 15px;
        }
        .slides {
            display: flex; transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform;
        }

        /* CARD */
        .card { 
            min-width: 100%; box-sizing: border-box;
            background: #fff; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(35, 54, 93, 0.12); 
            display: flex; flex-direction: column; text-align: left;
            position: relative;
        }

        /* TEXT WATERMARK */
        .watermark-text {
            position: absolute; bottom: 12px; right: 15px; font-size: 10px;
            font-weight: 700; color: rgba(35, 54, 93, 0.2); letter-spacing: 1px; z-index: 5;
        }

        /* HEADER BOX */
        .header-box { 
            height: 140px; position: relative; background: var(--zen-blue); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow: hidden; flex-shrink: 0; z-index: 1; text-align: center;
        }
        
        /* ALIGNED BACKGROUND "EXAM" TEXT */
        .header-box::after {
            content: "EXAM"; position: absolute; font-family: 'Playfair Display', serif;
            font-size: 4.5rem; color: rgba(255,255,255,0.05); 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            letter-spacing: 4px; pointer-events: none; z-index: 0;
        }

        /* TOP LEFT BADGE (Class) */
        .class-badge { 
            position: absolute; top: 12px; left: 12px; background: var(--zen-gold); 
            color: var(--zen-blue); padding: 4px 12px; font-size: 10px; font-weight: 700; 
            border-radius: 50px; z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.2); 
        }

        /* TOP RIGHT BADGE (Exam Kind) */
        .exam-kind-badge { 
            position: absolute; top: 12px; right: 12px; background: var(--zen-maroon); 
            color: #fff; padding: 4px 12px; font-size: 9px; font-weight: 700; 
            border-radius: 50px; z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.2); 
            letter-spacing: 0.5px;
        }
        
        .exam-date {
            font-family: 'Playfair Display', serif; color: #fff; font-size: 1.8rem; margin: 15px 0 5px 0; z-index: 2; line-height: 1;
        }
        .exam-countdown {
            color: var(--zen-gold); font-size: 11px; font-weight: 600; letter-spacing: 1px; z-index: 2; text-transform: uppercase; margin-top: 4px;
        }

        .maroon-line { height: 4px; background: var(--zen-maroon); width: 100%; flex-shrink: 0; z-index: 2; position: relative; }

        /* CONTENT AREA */
        .content { padding: 18px 18px 35px 18px; text-align: left; flex-grow: 1; position: relative; z-index: 2; }
        .category-tag { font-size: 10px; font-weight: 700; color: var(--zen-maroon); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        .res-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: bold; color: var(--zen-blue); margin-bottom: 12px; line-height: 1.2; }
        
        .detail-row {
            display: flex; justify-content: space-between; border-top: 1px solid #eee; 
            padding-top: 10px; margin-top: auto; font-size: 11.5px; color: #444; align-items: center;
        }
        .detail-row strong { color: var(--zen-blue); }

        /* EXAM PORTAL BUTTON (Matches Alumni Model Exactly) */
        .btn-wrap { margin-top: 5px; padding-bottom: 20px; }
        .btn-wrap a { 
            background: var(--zen-blue); color: #fff; padding: 8px 18px; 
            border-radius: 8px; text-decoration: none; font-size: 12px; 
            font-weight: 600; transition: 0.3s; display: inline-block; 
        }
        .btn-wrap a:hover { opacity: 0.9; }

        /* SKELETON LOADER */
        .skeleton { 
            min-width: 100%; height: 280px; 
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); 
            background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; 
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .message { font-size: 12px; color: #666; padding: 20px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>Upcoming Exams</h2>
    
    <div class="carousel" id="carousel">
        <div class="slides" id="slides">
            <div class="skeleton"></div>
        </div>
    </div>

    <div class="btn-wrap">
        <a href="https://azbtweb.wixsite.com/zen-dna/exam-timetable" target="_blank">Exam Timetable Portal →</a>
    </div>
</div>

<script>
// CSV LINKS
const sheetLinks = [
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRueYxNvUx2fn0rLxHcRQ2RJ8VyfTZr-uaJmkG0aaxEbsteWeOauYqP1DtWimZNSVlfn9XhZkjA1bkl/pub?gid=0&single=true&output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRueYxNvUx2fn0rLxHcRQ2RJ8VyfTZr-uaJmkG0aaxEbsteWeOauYqP1DtWimZNSVlfn9XhZkjA1bkl/pub?gid=1168000137&single=true&output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRueYxNvUx2fn0rLxHcRQ2RJ8VyfTZr-uaJmkG0aaxEbsteWeOauYqP1DtWimZNSVlfn9XhZkjA1bkl/pub?gid=2065563617&single=true&output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRueYxNvUx2fn0rLxHcRQ2RJ8VyfTZr-uaJmkG0aaxEbsteWeOauYqP1DtWimZNSVlfn9XhZkjA1bkl/pub?gid=255698561&single=true&output=csv"
];

const examKinds = [
  "FIRST CIA",
  "SECOND CIA",
  "PRACTICAL EXAM",
  "SEMESTER EXAM"
];

let index = 0;
let interval;
let totalExams = 0;

async function loadCSV(url, sheetIndex) {
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    rows.shift(); 

    return rows.map(r => ({
      sem: r[1]?.trim(),
      className: r[2]?.trim(),
      date: r[3]?.trim(),
      code: r[4]?.trim(),
      subject: r[5]?.trim(),
      type: r[6]?.trim(),
      examKind: examKinds[sheetIndex] 
    })).filter(r => r.date && r.className); 
  } catch (e) {
    return [];
  }
}

async function init() {
  const slidesContainer = document.getElementById("slides");

  try {
    const results = await Promise.all(sheetLinks.map((url, i) => loadCSV(url, i)));
    let data = results.flat();

    data.forEach(d => {
      const p = d.date.split(/[-/]/);
      if (p.length === 3) {
        d.dateObj = new Date(p[2], p[1] - 1, p[0]);
      } else {
        d.dateObj = new Date(0);
      }
    });

    const now = new Date();
    now.setHours(0, 0, 0, 0);

    const future = data.filter(d => d.dateObj >= now);

    if (future.length === 0) {
      slidesContainer.innerHTML = `<div class="message">No upcoming exams scheduled.</div>`;
      return;
    }

    const classMap = {};
    future.forEach(d => {
      if (!classMap[d.className] || d.dateObj < classMap[d.className].dateObj) {
        classMap[d.className] = d;
      }
    });

    const exams = Object.values(classMap).sort((a, b) => a.dateObj - b.dateObj);
    totalExams = exams.length;

    slidesContainer.innerHTML = exams.map(e => {
      const dateStr = e.dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      const diff = Math.round((e.dateObj - now) / (1000 * 60 * 60 * 24));
      
      let status = "";
      if (diff === 0) status = "✨ TODAY";
      else if (diff === 1) status = " ⏳ TOMORROW";
      else status = `IN ${diff} DAYS`;

      return `
        <div class="card">
            <div class="header-box">
                <div class="class-badge">${e.className}</div>
                <div class="exam-kind-badge">${e.examKind}</div>
                
                <div class="exam-date">${dateStr}</div>
                <div class="exam-countdown">${status}</div>
            </div>
            
            <div class="maroon-line"></div>

            <div class="content">
                <span class="category-tag">SEMESTER ${e.sem} • ${e.type}</span>
                <div class="res-title">${e.subject}</div>
                
                <div class="detail-row">
                    <span><strong>Subject Code:</strong> ${e.code}</span>
                </div>
                
                <div class="watermark-text">ZEN-DNA</div>
            </div>
        </div>
      `;
    }).join("");

    if (totalExams > 1) {
      setupInteractions();
      startSlider();
    }

  } catch (error) {
    slidesContainer.innerHTML = `<div class="message">Failed to load exam data.</div>`;
  }
}

function startSlider() {
  if (totalExams <= 1) return;
  interval = setInterval(() => {
    index = (index + 1) % totalExams;
    updateSlide();
  }, 4500);
}

function stopSlider() {
  clearInterval(interval);
}

function updateSlide() {
  document.getElementById("slides").style.transform = `translateX(-${index * 100}%)`;
}

function setupInteractions() {
  const carousel = document.getElementById("carousel");
  let startX = 0;
  let isSwiping = false;

  carousel.addEventListener("mouseenter", stopSlider);
  carousel.addEventListener("mouseleave", startSlider);

  carousel.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    isSwiping = true;
    stopSlider();
  }, {passive: true});

  carousel.addEventListener("touchend", (e) => {
    if (!isSwiping) return;
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (diff > 50) {
      index = (index + 1) % totalExams;
      updateSlide();
    } else if (diff < -50) {
      index = (index - 1 + totalExams) % totalExams;
      updateSlide();
    }
    
    isSwiping = false;
    startSlider();
  }, {passive: true});
}

init();
</script>

</body>
</html>
