<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZEN-DNA | Announcements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A;
            --zen-white: #FFFFFF; --zen-text: #2D2D2D;
        }

        body { margin: 0; background: transparent; font-family: 'Poppins', sans-serif; }

        .zen-section {
            background: var(--zen-white); border-top: 4px solid var(--zen-maroon);
            padding: 15px; width: 100%; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(35, 54, 93, 0.1); border-radius: 15px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .zen-title {
            font-family: 'Playfair Display', serif; font-size: clamp(20px, 4vw, 24px);
            color: var(--zen-blue); margin-bottom: 15px; display: flex; align-items: center; 
            border-bottom: 1.5px solid #F0F0F0; padding-bottom: 10px;
        }
        .zen-title::before { content: "📢"; margin-right: 12px; font-size: 22px; }

        .zen-container { height: 300px; overflow-y: auto; overflow-x: hidden; position: relative; }

        /* SKELETON LOADING */
        .skeleton { height: 80px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 10px; margin-bottom: 10px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ZEN SCROLLBAR */
        .zen-container::-webkit-scrollbar { width: 5px; }
        .zen-container::-webkit-scrollbar-thumb { background: var(--zen-blue); border-radius: 10px; }

        .news-item { padding: 12px 4px; border-bottom: 1px solid #F0F0F0; }
        .info-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

        .news-date, .news-label { font-size: 10px; font-weight: 700; color: #fff; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; }
        .news-date { background: var(--zen-blue); }
        .news-label { background: var(--zen-gold); color: var(--zen-blue); }

        .news-heading { font-size: clamp(14px, 3.5vw, 16px); color: var(--zen-blue); font-weight: 600; text-decoration: none; display: block; line-height: 1.4; margin-bottom: 5px; }
        .news-desc { font-size: clamp(12px, 3vw, 13.5px); color: #555; line-height: 1.6; }

        .important-wrapper { background: #FFF9F0; border-radius: 10px; border: 1.5px solid #FFE6B3; padding: 5px 12px; margin-bottom: 15px; position: sticky; top: 0; z-index: 5; }
        .badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-right: 6px; }
        .badge-new { background: #E6F7EE; color: #1BBF5C; }
        .badge-pin { background: #FCE8E8; color: var(--zen-maroon); }

        /* NAV BUTTON */
        .zen-btn-wrap { margin-top: 15px; text-align: center; }
        .zen-btn { background: var(--zen-blue); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; display: inline-block; transition: 0.3s; }
        .zen-btn:hover { background: var(--zen-maroon); }

        @keyframes scrollZen { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .scroll-enabled { animation: scrollZen 45s linear infinite; }
        .zen-container:hover .scroll-enabled { animation-play-state: paused; }
    </style>
</head>
<body>

<div class="zen-section">
    <div class="zen-title">Announcements</div>
    <div class="zen-container" id="newsViewport">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
    <div class="zen-btn-wrap">
        <a href="https://azbtweb.wixsite.com/zen-dna/announcement-portal" target="_blank" class="zen-btn">Announcement Portal →</a>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgmOyWGBYAOIQwOpIEVPb0G5SgYrx_VbkhmB5U0-5PxIT4yACse95T35IwK-_CSWB-n0Y9622eBn3c/pub?output=csv";

function parseDate(d) {
    if(!d) return new Date(0);
    const parts = d.split("-");
    return new Date(parts[2], parts[1] - 1, parts[0]);
}

function formatDate(d) {
    return parseDate(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

function processText(text) {
    if (!text) return "";
    // Replaces both literal \n and encoded line breaks with <br>
    return text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
}

fetch(CSV_URL).then(res => res.text()).then(data => {
    const rows = data.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");
    const now = new Date();
    const viewport = document.getElementById("newsViewport");
    viewport.innerHTML = '<div id="importantNews"></div><div id="normalNews"></div>';
    
    const impBox = document.getElementById("importantNews");
    const normBox = document.getElementById("normalNews");
    let announcementList = [];

    rows.forEach(row => {
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,"").trim());
        const [from, to, title, desc, attach, imp, lab] = cols;
        if (!from || !title) return;
        const fromDateObj = parseDate(from);
        const toDateObj = parseDate(to);

        if (now >= fromDateObj && now <= toDateObj) {
            announcementList.push({ 
                from, fromDateObj, title, desc, attach, lab: lab || "", 
                isImportant: imp && imp.toUpperCase() === "YES",
                isNew: (Date.now() - fromDateObj.getTime()) <= (72 * 60 * 60 * 1000)
            });
        }
    });

    announcementList.sort((a, b) => b.fromDateObj - a.fromDateObj).forEach(info => {
        const item = document.createElement("div");
        item.className = "news-item";
        let badges = "";
        if (info.isImportant) badges += `<span class="badge badge-pin">IMPORTANT</span>`;
        if (info.isNew) badges += `<span class="badge badge-new">NEW</span>`;
        
        let html = `<div class="info-row"><span class="news-date">${formatDate(info.from)}</span>`;
        if(info.lab) html += `<span class="news-label">${info.lab}</span>`;
        html += `</div>`;

        const cleanTitle = processText(info.title);
        if (info.attach && info.attach.startsWith('http')) {
            html += `<a class="news-heading" href="${info.attach}" target="_blank">${badges}${cleanTitle} 📎</a>`;
        } else {
            html += `<div class="news-heading">${badges}${cleanTitle}</div>`;
        }

        if (info.desc) html += `<div class="news-desc">${processText(info.desc)}</div>`;
        item.innerHTML = html;

        if (info.isImportant) {
            const wrap = document.createElement("div"); wrap.className = "important-wrapper";
            wrap.appendChild(item); impBox.appendChild(wrap);
        } else { normBox.appendChild(item); }
    });

    setTimeout(() => {
        const area = document.getElementById("normalNews");
        if (area.scrollHeight > viewport.offsetHeight) {
            area.innerHTML += area.innerHTML;
            area.classList.add("scroll-enabled");
        }
    }, 600);
});
</script>
</body>
</html>
