<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN-DNA | Pro Academic Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-light: #F4F6F9; --white: #FFFFFF; }
        
        body { font-family: 'Poppins', sans-serif; background: var(--zen-light); margin: 0; padding: 10px; color: var(--zen-blue); overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; margin: auto; box-sizing: border-box; }

        .header-section { text-align: center; padding: 10px 0; }
        .main-heading { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--zen-blue); margin: 0; }
        .header-underline { width: 40px; height: 3px; background: var(--zen-maroon); margin: 5px auto; border-radius: 2px; }

        .tabs { display: flex; background: #e0e4eb; padding: 4px; border-radius: 12px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; color: var(--zen-blue); transition: 0.3s; }
        .tab-btn.active { background: var(--white); color: var(--zen-maroon); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }

        .main-card { background: var(--white); border-radius: 20px; box-shadow: 0 10px 30px rgba(35,54,93,0.1); overflow: hidden; border-top: 4px solid var(--zen-maroon); }
        .month-bar { padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .month-bar h2 { font-family: 'Playfair Display'; font-size: 1.1rem; margin: 0; color: var(--zen-blue); }
        .nav-arrow { background: var(--zen-blue); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }

        /* CALENDAR GRID - NO OVERFLOW FIX */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; width: 100%; box-sizing: border-box; }
        .day-label { background: var(--white); font-size: 9px; font-weight: 800; color: var(--zen-gold); padding: 10px 0; text-align: center; text-transform: uppercase; }
        
        .cell { background: var(--white); height: 85px; padding: 5px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; overflow: hidden; cursor: pointer; }
        .cell.selected { background: #fff9ed; box-shadow: inset 0 0 0 1.5px var(--zen-gold); z-index: 5; }
        .cell.today { background: #fdf8eb; }
        .cell.holiday { background: #fff8f8; }
        .cell.not-month { opacity: 0.1; pointer-events: none; }

        .date-num { font-size: 11px; font-weight: 800; color: var(--zen-blue); margin-bottom: 2px; }
        .cell-do { font-size: 7px; font-weight: 800; color: var(--zen-gold); margin-bottom: 2px; text-transform: uppercase; }
        .cell-scroll { flex-grow: 1; overflow-y: auto; font-size: 7.5px; line-height: 1.2; color: var(--zen-maroon); font-weight: 600; scrollbar-width: none; }
        .cell-scroll::-webkit-scrollbar { display: none; }

        .detail-area { background: var(--zen-light); padding: 15px; border-top: 2px solid var(--zen-gold); min-height: 90px; }
        .detail-h { font-size: 12px; font-weight: 800; color: var(--zen-blue); margin-bottom: 4px; }
        .detail-p { font-size: 11px; color: var(--zen-maroon); line-height: 1.4; margin: 0; }

        /* LIST VIEW - COMPULSORY ALL DATES */
        #list-view { display: none; height: 450px; overflow-y: auto; padding: 10px; }
        .list-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; background: #fff; margin-bottom: 8px; border-radius: 12px; }
        .list-card.is-today { background: #fffdf5; border: 1px solid var(--zen-gold); }
        
        .badge { min-width: 44px; height: 44px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--zen-gold); }
        .date-badge { background: var(--zen-blue); color: var(--zen-gold); margin-right: 12px; }
        .date-badge .d { font-size: 18px; font-weight: 700; line-height: 1; }
        .date-badge .w { font-size: 7px; text-transform: uppercase; }

        .list-info { flex: 1; padding-right: 10px; }
        .list-event { font-size: 11px; font-weight: 700; color: var(--zen-blue); }
        .list-sub { font-size: 9px; color: var(--zen-maroon); margin-top: 2px; }

        .order-badge { background: var(--white); color: var(--zen-blue); }
        .order-badge .o-lbl { font-size: 7px; font-weight: 800; opacity: 0.8; }
        .order-badge .o-val { font-size: 14px; font-weight: 800; color: var(--zen-maroon); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 class="main-heading">Academic Calendar</h1>
        <div class="header-underline"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-cal" onclick="switchTab('cal')">Calendar View</button>
        <button class="tab-btn" id="btn-list" onclick="switchTab('list')">Schedule List</button>
    </div>

    <div class="main-card">
        <div class="month-bar">
            <button class="nav-arrow" onclick="moveMonth(-1)">❮</button>
            <h2 id="monthLabel"></h2>
            <button class="nav-arrow" onclick="moveMonth(1)">❯</button>
        </div>

        <div id="cal-mode">
            <div class="grid" id="grid"></div>
            <div class="detail-area" id="detailArea"></div>
        </div>

        <div id="list-view">
            <div id="listContent"></div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSlPaldSsB6LS1eDDZO9xSnmmcJcQZBGwI9XfvyEcrhnielFa97O7S-fERMBipoRBSBbUDAhN67kw7/pub?gid=0&single=true&output=csv";
    
    let db = [];
    let curDate = new Date();
    const today = new Date();

    async function load() {
        try {
            const r = await fetch(CSV_URL);
            const t = await r.text();
            db = t.split('\n').slice(1).map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    date: c[0]?.trim(), 
                    working: c[2]?.trim(), 
                    order: c[3]?.trim(), 
                    event: c[5]?.replace(/"/g,'').trim(), 
                    reason: c[6]?.replace(/"/g,'').trim() 
                };
            });
            render();
            autoHighlightToday();
        } catch(e) { console.error(e); }
    }

    function render() {
        const m = curDate.getMonth(), y = curDate.getFullYear();
        document.getElementById('monthLabel').innerText = curDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        renderGrid(m, y);
        renderList(m, y);
    }

    function renderGrid(m, y) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);
        
        const first = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cell not-month"></div>`;

        for(let d=1; d<=days; d++) {
            const dStr = `${d.toString().padStart(2,'0')}-${(m+1).toString().padStart(2,'0')}-${y}`;
            const info = db.find(r => r.date === dStr);
            const isToday = today.getDate()===d && today.getMonth()===m && today.getFullYear()===y;
            const isHol = info?.working === 'No' || new Date(y,m,d).getDay() === 0;

            const cell = document.createElement('div');
            cell.className = `cell ${isToday ? 'today' : ''} ${isHol ? 'holiday' : ''}`;
            cell.id = `cell-${dStr}`;
            cell.innerHTML = `
                <span class="date-num">${d}</span>
                ${info?.order ? `<div class="cell-do">Order ${info.order}</div>` : ''}
                <div class="cell-scroll">${info?.event || info?.reason || ''}</div>
            `;
            cell.onclick = () => {
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
                cell.classList.add('selected');
                setDetail(info, dStr);
            };
            grid.appendChild(cell);
        }
    }

    function setDetail(info, date) {
        const area = document.getElementById('detailArea');
        if(!info) {
            area.innerHTML = `<div class="detail-h">${date}</div><p class="detail-p">No specific data recorded.</p>`;
            return;
        }
        area.innerHTML = `
            <div class="detail-h">${date} | ${info.working === 'Yes' ? 'Working Day' : 'Holiday'}</div>
            <p class="detail-p">
                ${info.order ? `<strong>Day Order:</strong> ${info.order}<br>` : ''}
                ${info.event ? `<strong>Event:</strong> ${info.event}<br>` : ''}
                ${info.reason ? `<strong>Note:</strong> ${info.reason}` : ''}
            </p>
        `;
    }

    function renderList(m, y) {
        const cont = document.getElementById('listContent');
        cont.innerHTML = '';
        const days = new Date(y, m + 1, 0).getDate();

        for(let d=1; d<=days; d++) {
            const dStr = `${d.toString().padStart(2,'0')}-${(m+1).toString().padStart(2,'0')}-${y}`;
            const info = db.find(r => r.date === dStr);
            const dateObj = new Date(y, m, d);
            const isToday = today.getDate()===d && today.getMonth()===m && today.getFullYear()===y;

            const row = document.createElement('div');
            row.className = `list-card ${isToday ? 'is-today' : ''}`;
            if(isToday) row.id = "today-list-scroll";
            
            row.innerHTML = `
                <div class="badge date-badge">
                    <div class="d">${d}</div>
                    <div class="w">${dateObj.toLocaleString('default', {weekday:'short'})}</div>
                </div>
                <div class="list-info">
                    <div class="list-event">${info?.event || info?.reason || (info?.working === 'Yes' ? ' ' : 'Holiday')}</div>
                    ${info?.event && info?.reason ? `<div class="list-sub">${info.reason}</div>` : ''}
                </div>
                ${info?.order ? `<div class="badge order-badge"><span class="o-lbl">ORDER</span><span class="o-val">${info.order}</span></div>` : ''}
            `;
            cont.appendChild(row);
        }
    }

    function autoHighlightToday() {
        const dStr = `${today.getDate().toString().padStart(2,'0')}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getFullYear()}`;
        const info = db.find(r => r.date === dStr);
        const cell = document.getElementById(`cell-${dStr}`);
        if(cell) {
            cell.classList.add('selected');
            setDetail(info, dStr);
        }
    }

    function switchTab(t) {
        document.getElementById('cal-mode').style.display = t==='cal'?'block':'none';
        document.getElementById('list-view').style.display = t==='list'?'block':'none';
        document.getElementById('btn-cal').className = `tab-btn ${t==='cal'?'active':''}`;
        document.getElementById('btn-list').className = `tab-btn ${t==='list'?'active':''}`;
        if(t === 'list') {
            setTimeout(() => {
                const target = document.getElementById('today-list-scroll');
                if(target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
    }

    function moveMonth(dir) {
        curDate.setMonth(curDate.getMonth() + dir);
        render();
    }

    load();
</script>
</body>
</html>
