<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN - DNA | Alumni Spotlight</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-light: #F4F6F9; }

body { font-family: 'Poppins', sans-serif; background: transparent; margin: 0; padding: 0; overflow-x: hidden; }

/* FULLY RESPONSIVE CONTAINER */
.container { 
    width: 95%; 
    max-width: 800px; 
    margin: 15px auto; 
    text-align: center; 
}

/* HEADING & ICON */
h2 { 
    font-family: 'Playfair Display', serif; 
    color: var(--zen-blue); 
    margin: 0; 
    font-size: clamp(1.3rem, 4vw, 1.8rem); 
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}
h2 i { color: var(--zen-blue); }

.heading-line { 
    width: 45px; height: 3px; 
    background: var(--zen-maroon); 
    margin: 12px auto 25px auto; 
    border-radius: 2px;
}

/* SLIDER FRAME */
.slider { 
    overflow: hidden; 
    position: relative; 
    border-radius: 20px; 
    background: #fff; 
    box-shadow: 0 12px 30px rgba(35, 54, 93, 0.15); 
    cursor: grab; 
    width: 100%; 
}
.track { display: flex; transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1); }

/* CARD STRUCTURE */
.card { 
    min-width: 100%; 
    display: flex; 
    flex-direction: column;
    text-align: left; 
    box-sizing: border-box; 
}

/* RESPONSIVE IMAGE BOX */
.img-box { 
    height: clamp(200px, 45vw, 320px); 
    position: relative; 
    background: #111; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}
.bg-blur { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: blur(15px); opacity: 0.35; z-index: 1; }
.main-img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 2; }

/* BADGES WITH ICONS */
.tag-badge { 
    position: absolute; top: 15px; left: 15px; 
    background: rgba(255,255,255,0.92); color: var(--zen-blue); 
    padding: 5px 12px; font-size: clamp(9px, 2vw, 11px); 
    font-weight: 700; border-radius: 50px; 
    text-transform: uppercase; z-index: 5;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.year-badge { 
    position: absolute; top: 15px; right: 15px; 
    background: var(--zen-maroon); color: #fff; 
    padding: 5px 12px; font-size: clamp(9px, 2vw, 11px); 
    font-weight: 700; border-radius: 8px; z-index: 5;
    display: flex; align-items: center; gap: 6px;
}

/* CONTENT SECTION */
.content { 
    padding: clamp(15px, 4vw, 25px); 
    border-top: 5px solid var(--zen-maroon); 
    background: #fff;
}
.title { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: bold; color: var(--zen-blue); margin-bottom: 4px; }
.career { font-size: clamp(10px, 2.5vw, 12px); font-weight: 600; color: var(--zen-maroon); margin-bottom: 12px; letter-spacing: 0.8px; }
.meta { font-size: clamp(10px, 2.2vw, 11px); color: #000; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 15px; }
.meta i { color: var(--zen-gold); }

.desc { 
    font-size: clamp(11px, 2.5vw, 13px); 
    color: #00000; line-height: 1.6; 
    margin-top: 12px;
}

/* ACTIONS */
.actions { 
    display: flex; flex-wrap: wrap; gap: 15px; 
    border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; 
}
.action-btn { 
    font-size: clamp(10px, 2.2vw, 12px); 
    text-decoration: none; color: var(--zen-blue); 
    font-weight: 600; display: flex; align-items: center; gap: 8px;
    transition: transform 0.2s;
}
.action-btn i { color: var(--zen-gold); font-size: 14px; }
.action-btn:hover { transform: translateY(-2px); }

/* BTN WRAP */
.btn-wrap { margin-top: 20px; }
.btn-wrap a { 
    background: var(--zen-blue); color: #fff; 
    padding: 12px 28px; border-radius: 10px; 
    text-decoration: none; font-size: clamp(12px, 3vw, 14px); 
    font-weight: 600; transition: 0.3s; display: inline-block;
    box-shadow: 0 4px 15px rgba(35, 54, 93, 0.2);
}
.btn-wrap a:hover { background: var(--zen-maroon); transform: translateY(-3px); }

#loading-box { height: 400px; background: #eee; border-radius: 20px; animation: pulse 1.5s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }
</style>
</head>
<body>

<div class="container">
  <h2><i class="fa-solid fa-user-graduate"></i> Alumni Spotlight</h2>
  <div class="heading-line"></div>

  <div id="loading-box"></div>
  
  <div class="slider" id="slider" style="display:none;">
    <div class="track" id="track"></div>
  </div>

  <div class="btn-wrap">
    <a href="https://azbtweb.wixsite.com/zen-dna/alumni" target="_blank">Alumni Portal →</a>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHU-kKOA2WoCCeSAVZJ_GVoziAyKETXE59glo1GrOy2_hYLHaV_fQ4CWm0_SFWLZ3gt3e2TnkQX1Ad/pub?output=csv";

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    let obj = {};
    headers.forEach((h, i) => {
      let val = values[i] ? values[i].replace(/^"|"$/g, '').trim() : "";
      obj[h] = val;
    });
    return obj;
  });
}

function getImageUrl(url) {
  if(!url) return "";
  const match = url.match(/[-\w]{25,}/);
  return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=w800` : url;
}

fetch(CSV_URL).then(res => res.text()).then(csv => {
  let data = parseCSV(csv);
  const track = document.getElementById("track");

  let alumni = data.sort((a, b) => (parseInt(b.Year) || 0) - (parseInt(a.Year) || 0)).slice(0, 10);

  document.getElementById("loading-box").style.display = "none";
  document.getElementById("slider").style.display = "block";

  alumni.forEach((item) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="img-box">
        <img src="${getImageUrl(item.Image_URL)}" class="bg-blur">
        <img src="${getImageUrl(item.Image_URL)}" class="main-img" onerror="this.src='https://via.placeholder.com/600x400?text=ZEN+DNA+Alumni'">
        <div class="tag-badge"><i class="fa-solid fa-circle-user"></i> ${item.Highlight_Tag || 'Alumni'}</div>
        <div class="year-badge"><i class="fa-solid fa-users"></i> Class of ${item.Year}</div>
      </div>
      <div class="content">
        <div class="title">${item.Name}</div>
        <div class="career">${item.Current_Position} @ ${item.Organization}</div>
        <div class="meta">
            <span><i class="fa-solid fa-graduation-cap"></i>  ${item.Degree}</span>
            <span><i class="fa-solid fa-id-card"></i>  ${item.Register_No}</span>
        </div>
        <div class="desc">${item.Description || ''}</div>
        <div class="actions">
           ${item.LinkedIn ? `<a href="${item.LinkedIn}" target="_blank" class="action-btn"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>` : ''}
           ${item.Email ? `<a href="mailto:${item.Email}" class="action-btn"><i class="fa-solid fa-envelope"></i> Email</a>` : ''}
        </div>
      </div>
    `;
    track.appendChild(card);
  });

  initSlider(alumni.length);
});

function initSlider(count) {
  const slider = document.getElementById("slider"), track = document.getElementById("track");
  let startX, curIdx = 0, isDragging = false;

  const move = (idx) => {
    curIdx = (idx + count) % count;
    track.style.transform = `translateX(-${curIdx * 100}%)`;
  };

  let auto = setInterval(() => move(curIdx + 1), 6000);

  slider.onmousedown = slider.ontouchstart = (e) => {
    clearInterval(auto);
    isDragging = true;
    startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
  };

  window.onmouseup = window.ontouchend = (e) => {
    if(!isDragging) return;
    isDragging = false;
    let endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
    if(startX - endX > 50) move(curIdx + 1);
    else if(startX - endX < -50) move(curIdx - 1);
    auto = setInterval(() => move(curIdx + 1), 6000);
  };
}
</script>
</body>
</html>
