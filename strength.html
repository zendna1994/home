<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals of Zoo | Strength</title>
    
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/e98a4d_b935ab57540b41bdb320efa88b5e69b1~mv2.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-light: #F4F6F9; }
        
        body { margin:0; font-family: 'Poppins', sans-serif; background: transparent; overflow-x: hidden; }

        .container { width: 100%; max-width: 350px; margin: auto; text-align: center; padding: 10px 5px; }
        
        h2 { font-family: 'Playfair Display', serif; color: var(--zen-blue); margin: 0 0 10px 0; font-size: 1.4rem; }
        h2::after { content: ''; display: block; width: 35px; height: 3px; background: var(--zen-maroon); margin: 8px auto; }

        .dashboard-frame { 
            background: #fff; border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(35, 54, 93, 0.12); 
            overflow: hidden; border-top: 4px solid var(--zen-maroon);
        }

        .select-box { padding: 10px; background: var(--zen-light); border-bottom: 1px solid #eee; }
        select { 
            width: 100%; padding: 6px; border-radius: 8px; border: 1px solid #ddd;
            font-family: 'Poppins'; font-size: 12px; font-weight: 600; color: var(--zen-blue);
            outline: none; cursor: pointer;
        }

        .grid { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        
        .stat-card { 
            background: var(--zen-light); padding: 12px; border-radius: 15px; 
            border-bottom: 3px solid var(--zen-gold);
            transition: transform 0.3s ease;
        }
        
        .card-title { font-size: 11px; font-weight: 700; color: var(--zen-blue); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 0.5px; }
        
        .row { display: flex; justify-content: space-around; align-items: center; }
        
        .stat-group { flex: 1; }
        .val { font-size: 1.3rem; font-weight: 700; color: var(--zen-maroon); display: block; line-height: 1; }
        .lbl { font-size: 9px; color: #888; font-weight: 600; margin-top: 4px; display: block; }

        .split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .summary-bar { 
            display: flex; justify-content: space-around; 
            padding: 12px; background: var(--zen-blue); color: white;
        }
        .sum-item .s-val { font-size: 1.2rem; font-weight: 700; color: var(--zen-gold); display: block; }
        .sum-item .s-lbl { font-size: 8px; text-transform: uppercase; opacity: 0.8; font-weight: 600; }

        .chart-box { padding: 15px; height: 200px; background: #fff; }

        .skeleton { height: 400px; background: #eee; border-radius: 20px; position: relative; overflow: hidden; }
        .skeleton::after { 
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); 
            animation: shimmer 1.5s infinite; 
        }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Animals of Zoo</h2>
    
    <div id="loader" class="skeleton"></div>

    <div class="dashboard-frame" id="main-ui" style="display:none;">
        <div class="select-box">
            <select id="yearSelect"></select>
        </div>

        <div class="grid">
            <div class="stat-card">
                <span class="card-title">🎓 Undergraduate</span>
                <div class="row">
                    <div class="stat-group"><span class="val" id="ug1">0</span><span class="lbl">1st UG</span></div>
                    <div class="stat-group"><span class="val" id="ug2">0</span><span class="lbl">2nd UG</span></div>
                    <div class="stat-group"><span class="val" id="ug3">0</span><span class="lbl">3rd UG</span></div>
                </div>
            </div>

            <div class="stat-card">
                <span class="card-title">🎓 Postgraduate</span>
                <div class="row">
                    <div class="stat-group"><span class="val" id="pg1">0</span><span class="lbl">1st PG</span></div>
                    <div class="stat-group"><span class="val" id="pg2">0</span><span class="lbl">2nd PG</span></div>
                </div>
            </div>

            <div class="split-row">
                <div class="stat-card">
                    <span class="card-title">🔬 Ph.D.</span>
                    <span class="val" id="phd">0</span>
                    <span class="lbl">Scholars</span>
                </div>
                <div class="stat-card">
                    <span class="card-title">👨‍🏫 Staff</span>
                    <span class="val" id="staff">0</span>
                    <span class="lbl">Faculty</span>
                </div>
            </div>
        </div>

        <div class="summary-bar">
            <div class="sum-item"><span class="s-val" id="total-stud">0</span><span class="s-lbl">Total Students</span></div>
            <div class="sum-item"><span class="s-val" id="total-staff">0</span><span class="s-lbl">Dept Staff</span></div>
        </div>

        <div class="chart-box">
            <canvas id="growthChart"></canvas>
        </div>
    </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuKJBdfchGw0cs6jarymj6fq1VHM_7IVu_283QtpF0D_Dd2CZ7AvooQwm_JHWBbiJkNeQvVoCMYeNL/pub?output=csv";

let dataset = [];
let chart = null;

async function init() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const rows = text.trim().split("\n").slice(1);
        
        dataset = rows.map(r => {
            const c = r.split(",");
            return {
                year: c[0],
                ug1: +c[1] || 0, ug2: +c[2] || 0, ug3: +c[3] || 0,
                pg1: +c[4] || 0, pg2: +c[5] || 0,
                phd: +c[6] || 0, staff: +c[7] || 0
            };
        });

        const select = document.getElementById("yearSelect");
        dataset.forEach((d, i) => {
            let opt = document.createElement("option");
            opt.value = i; opt.text = d.year;
            select.appendChild(opt);
        });

        document.getElementById("loader").style.display = "none";
        document.getElementById("main-ui").style.display = "block";

        select.selectedIndex = dataset.length - 1;
        updateUI(dataset[dataset.length - 1]);
        createProChart();

        select.onchange = () => updateUI(dataset[select.value]);

    } catch (e) { console.error("Error loading ZEN data:", e); }
}

function animateCounter(id, target) {
    let current = 0;
    const duration = 1500;
    const increment = target / (duration / 16);
    const el = document.getElementById(id);
    
    function step() {
        current += increment;
        if (current < target) {
            el.innerText = Math.floor(current);
            requestAnimationFrame(step);
        } else {
            el.innerText = target;
        }
    }
    step();
}

function updateUI(d) {
    animateCounter("ug1", d.ug1); animateCounter("ug2", d.ug2); animateCounter("ug3", d.ug3);
    animateCounter("pg1", d.pg1); animateCounter("pg2", d.pg2);
    animateCounter("phd", d.phd); animateCounter("staff", d.staff);
    animateCounter("total-stud", (d.ug1+d.ug2+d.ug3+d.pg1+d.pg2+d.phd));
    animateCounter("total-staff", d.staff);
}

function createProChart() {
    const ctx = document.getElementById('growthChart').getContext('2d');
    
    const grad = ctx.createLinearGradient(0, 0, 0, 180);
    grad.addColorStop(0, 'rgba(35, 54, 93, 0.4)');
    grad.addColorStop(1, 'rgba(35, 54, 93, 0)');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataset.map(d => d.year),
            datasets: [{
                data: dataset.map(d => d.ug1+d.ug2+d.ug3+d.pg1+d.pg2+d.phd),
                borderColor: '#23365D',
                borderWidth: 3,
                backgroundColor: grad,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#6C232E',
                pointBorderColor: '#fff',
                pointRadius: 4,
                pointHoverRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(35, 54, 93, 0.9)',
                    padding: 10,
                    titleFont: { family: 'Poppins', size: 12 },
                    bodyFont: { family: 'Poppins', size: 11 },
                    displayColors: false,
                    callbacks: {
                        label: (context) => {
                            const d = dataset[context.dataIndex];
                            return [
                                `UG: ${d.ug1+d.ug2+d.ug3}`,
                                `PG: ${d.pg1+d.pg2}`,
                                `PhD: ${d.phd}`,
                                `Total: ${context.raw}`
                            ];
                        }
                    }
                }
            },
            scales: {
                y: { 
                    beginAtZero: true, 
                    grid: { display: false },
                    ticks: { font: { size: 9, family: 'Poppins' } }
                },
                x: { 
                    grid: { display: false },
                    ticks: { font: { size: 9, family: 'Poppins' } }
                }
            }
        }
    });
}

init();
</script>
</body>
</html>
