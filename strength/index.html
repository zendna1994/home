<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals of Zoo | Strength</title>
    
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/e98a4d_b935ab57540b41bdb320efa88b5e69b1~mv2.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-light: #F4F6F9; }
        
        body { margin:0; font-family: 'Poppins', sans-serif; background: transparent; overflow-x: hidden; padding: 10px; }

        .container { width: 100%; max-width: 1000px; margin: auto; text-align: center; }
        
        h2 { font-family: 'Playfair Display', serif; color: var(--zen-blue); margin: 0 0 15px 0; font-size: 1.8rem; }
        h2::after { content: ''; display: block; width: 50px; height: 3px; background: var(--zen-maroon); margin: 8px auto; }

        .dashboard-frame { 
            background: #fff; border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(35, 54, 93, 0.1); 
            overflow: hidden; border-top: 5px solid var(--zen-maroon);
            padding-bottom: 20px;
        }

        .select-box { padding: 20px; background: var(--zen-light); display: flex; justify-content: center; }
        select { 
            width: 100%; max-width: 300px; padding: 10px; border-radius: 12px; border: 1px solid #ddd;
            font-family: 'Poppins'; font-size: 14px; font-weight: 600; color: var(--zen-blue);
            outline: none; cursor: pointer;
        }

        .grid { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }

        .stat-card { 
            background: var(--zen-light); padding: 18px; border-radius: 18px; 
            border-bottom: 4px solid var(--zen-gold);
            transition: all 0.3s ease;
        }

        @media (max-width: 767px) {
            .stat-card:nth-child(1), .stat-card:nth-child(2) { grid-column: span 2; }
            .stat-card:nth-child(3), .stat-card:nth-child(4) { grid-column: span 1; padding: 15px 10px; }
            .stat-card:nth-child(3) .val, .stat-card:nth-child(4) .val { font-size: 1.3rem; }
        }
        
        .card-title { font-size: 10px; font-weight: 700; color: var(--zen-blue); text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1px; }
        
        .row { display: flex; justify-content: space-around; align-items: center; }
        
        .stat-group { flex: 1; }

        .val { 
            font-size: 1.6rem; font-weight: 700; color: var(--zen-maroon); 
            display: block; line-height: 1;
            transition: all 0.2s ease;
        }
        .pulse-active {
            color: var(--zen-gold) !important;
            text-shadow: 0 0 15px rgba(212, 166, 74, 0.6);
            transform: scale(1.15);
        }

        .lbl { font-size: 10px; color: #888; font-weight: 600; margin-top: 5px; display: block; }

        .summary-bar { 
            display: flex; justify-content: space-around; 
            padding: 15px; background: var(--zen-blue); color: white; margin: 0 20px; border-radius: 15px;
        }
        .sum-item .s-val { font-size: 1.4rem; font-weight: 700; color: var(--zen-gold); display: block; }
        .sum-item .s-lbl { font-size: 9px; text-transform: uppercase; opacity: 0.9; font-weight: 600; letter-spacing: 1px; }

        .chart-box { 
            margin: 20px; padding: 15px; height: 350px; 
            background: #fff; border-radius: 18px; border: 1px solid #f0f0f0;
        }

        .skeleton { height: 500px; width: 100%; background: #eee; border-radius: 24px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Animals of Zoo</h2>
    
    <div id="loader" class="skeleton"></div>

    <div class="dashboard-frame" id="main-ui" style="display:none;">
        <div class="select-box">
            <select id="yearSelect"></select>
        </div>

        <div class="grid">
            <div class="stat-card">
                <span class="card-title">🎓 Undergraduate (UG)</span>
                <div class="row">
                    <div class="stat-group"><span class="val" id="ug1">0</span><span class="lbl">1st UG</span></div>
                    <div class="stat-group"><span class="val" id="ug2">0</span><span class="lbl">2nd UG</span></div>
                    <div class="stat-group"><span class="val" id="ug3">0</span><span class="lbl">3rd UG</span></div>
                </div>
            </div>

            <div class="stat-card">
                <span class="card-title">🎓 Postgraduate (PG)</span>
                <div class="row">
                    <div class="stat-group"><span class="val" id="pg1">0</span><span class="lbl">1st PG</span></div>
                    <div class="stat-group"><span class="val" id="pg2">0</span><span class="lbl">2nd PG</span></div>
                </div>
            </div>

            <div class="stat-card" style="border-bottom-color: var(--zen-maroon);">
                <span class="card-title">🔬 Researcher Scholars (PhD)</span>
                <div class="row">
                    <div class="stat-group"><span class="val" id="phd">0</span><span class="lbl">PhD Scholars</span></div>
                </div>
            </div>

            <div class="stat-card" style="border-bottom-color: var(--zen-blue);">
                <span class="card-title">👨‍🏫 Faculty </span>
                <div class="row">
                    <div class="stat-group"><span class="val" id="staff">0</span><span class="lbl">Active Staff</span></div>
                </div>
            </div>
        </div>

        <div class="summary-bar">
            <div class="sum-item"><span class="s-val" id="total-stud">0</span><span class="s-lbl">Total Students</span></div>
            <div class="sum-item"><span class="s-val" id="total-staff">0</span><span class="s-lbl">Faculty Strength</span></div>
        </div>

        <div class="chart-box">
            <canvas id="growthChart"></canvas>
        </div>
    </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuKJBdfchGw0cs6jarymj6fq1VHM_7IVu_283QtpF0D_Dd2CZ7AvooQwm_JHWBbiJkNeQvVoCMYeNL/pub?output=csv";

let dataset = [];
let chart = null;

async function init() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const rows = text.trim().split("\n").slice(1);
        
        dataset = rows.map(r => {
            const c = r.split(",");
            return {
                year: c[0],
                ug1: +c[1] || 0, ug2: +c[2] || 0, ug3: +c[3] || 0,
                pg1: +c[4] || 0, pg2: +c[5] || 0,
                phd: +c[6] || 0, staff: +c[7] || 0
            };
        });

        const select = document.getElementById("yearSelect");
        dataset.forEach((d, i) => {
            let opt = document.createElement("option");
            opt.value = i; opt.text = d.year;
            select.appendChild(opt);
        });

        document.getElementById("loader").style.display = "none";
        document.getElementById("main-ui").style.display = "block";

        select.selectedIndex = dataset.length - 1;
        updateUI(dataset[dataset.length - 1]);
        createUnifiedChart();

        select.onchange = () => updateUI(dataset[select.value]);

    } catch (e) { console.error(e); }
}

function animateCounter(id, target) {
    let current = 0;
    const duration = 2000;
    const el = document.getElementById(id);
    const start = performance.now();

    el.classList.add('pulse-active');

    function step(timestamp) {
        const progress = Math.min((timestamp - start) / duration, 1);
        el.innerText = Math.floor(progress * target);
        
        if (progress < 1) {
            requestAnimationFrame(step);
        } else {
            el.innerText = target;
            el.classList.remove('pulse-active');
        }
    }
    requestAnimationFrame(step);
}

function updateUI(d) {
    animateCounter("ug1", d.ug1); animateCounter("ug2", d.ug2); animateCounter("ug3", d.ug3);
    animateCounter("pg1", d.pg1); animateCounter("pg2", d.pg2);
    animateCounter("phd", d.phd); animateCounter("staff", d.staff);
    animateCounter("total-stud", (d.ug1+d.ug2+d.ug3+d.pg1+d.pg2+d.phd));
    animateCounter("total-staff", d.staff);
}

function createUnifiedChart() {
    const ctx = document.getElementById('growthChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: dataset.map(d => d.year),
            datasets: [
                { label: 'UG', data: dataset.map(d => d.ug1+d.ug2+d.ug3), backgroundColor: '#23365D', borderRadius: 5 },
                { label: 'PG', data: dataset.map(d => d.pg1+d.pg2), backgroundColor: '#6C232E', borderRadius: 5 },
                { label: 'PhD', data: dataset.map(d => d.phd), backgroundColor: '#D4A64A', borderRadius: 5 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } },
            plugins: {
                legend: { position: 'bottom' },
                tooltip: {
                    enabled: true,
                    mode: 'index',
                    intersect: false,
                    backgroundColor: 'rgba(35, 54, 93, 0.95)',
                    titleFont: { family: 'Poppins', size: 14, weight: 'bold' },
                    bodyFont: { family: 'Poppins', size: 13 },
                    padding: 15,
                    displayColors: false,
                    callbacks: {
                        title: (items) => `Year: ${items[0].label}`,
                        label: (item) => {
                            // This replaces the default individual bars with a single list
                            const d = dataset[item.dataIndex];
                            if (item.datasetIndex === 0) {
                                return [
                                    `UG Total: ${d.ug1 + d.ug2 + d.ug3}`,
                                    `PG Total: ${d.pg1 + d.pg2}`,
                                    `PhD Scholars: ${d.phd}`,
                                    `------------------`,
                                    `Grand Total: ${d.ug1 + d.ug2 + d.ug3 + d.pg1 + d.pg2 + d.phd}`
                                ];
                            }
                            return null; // Don't show labels for the other stacked segments
                        }
                    },
                    filter: (item) => item.datasetIndex === 0 // Only process tooltip for the first dataset to avoid duplication
                }
            }
        }
    });
}

init();
</script>
</body>
</html>
