<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ZEN - DNA | ZALC Members Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root { --zen-blue: #23365D; --zen-maroon: #6C232E; --zen-gold: #D4A64A; --zen-white: #FFFFFF; --zen-bg: #F4F6F9; }
    
    /* Security: Prevent text selection */
    * { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; }

    body { font-family: 'Poppins', sans-serif; background: var(--zen-bg); margin: 0; padding: 10px; color: var(--zen-blue); }

    /* Security: Disable printing */
    @media print { body { display: none !important; } }

    .portal-wrapper {
        width: 100%; max-width: 1100px; margin: 0 auto; background: var(--zen-white);
        border-radius: 20px; box-shadow: 0 10px 40px rgba(35,54,93,0.12);
        display: flex; flex-direction: column; height: 95vh; overflow: hidden; position: relative;
    }

    /* Security: Block pointer events on images */
    img { pointer-events: none; -webkit-user-drag: none; }

    #zenLoader {
        position: absolute; inset: 0; background: #fff; z-index: 100;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .zen-spinner {
        width: 50px; height: 50px; border: 3px solid var(--zen-bg);
        border-top: 3px solid var(--zen-maroon); border-radius: 50%;
        animation: rotate 1s linear infinite;
    }
    .zen-text { margin-top: 15px; font-family: 'Playfair Display'; font-weight: 700; letter-spacing: 2px; color: var(--zen-blue); animation: pulse 1.5s infinite; }

    .portal-header { padding: 15px 20px; border-bottom: 4px solid var(--zen-maroon); background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 60px; }
    h2 { font-family: 'Playfair Display', serif; color: var(--zen-blue); margin: 0; font-size: 1.3rem; text-align: center; width: 100%; line-height: 1.2; }
    #portalSubTitle { font-size: 0.85rem; font-weight: 600; color: var(--zen-maroon); margin-top: 2px; display: none; }
    
    .back-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: var(--zen-blue); color: #fff; border: none; padding: 7px 14px; border-radius: 6px; font-size: 10px; cursor: pointer; display: none; font-weight: 700; z-index: 10; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

    .filter-bar { background: #f1f3f6; padding: 12px 15px; border-bottom: 1px solid #ddd; }
    .filter-grid { display: flex; gap: 10px; align-items: flex-end; }
    .filter-item { flex: 1; min-width: 0; }
    .detail-filters { display: none; margin-top: 10px; gap: 10px; }
    
    label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--zen-blue); margin-bottom: 4px; display: block; overflow: hidden; white-space: nowrap; }
    input, select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; width: 100%; box-sizing: border-box; background: #fff; }

    .view-container { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; scroll-behavior: smooth; }
    .group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
    .group-card { background: #fff; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border-top: 4px solid var(--zen-maroon); }
    .group-card img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; }
    .group-card h3 { font-family: 'Playfair Display'; margin: 0; font-size: 1.3rem; }

    .member-item-container { background: #fff; margin-bottom: 12px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .member-main-card { display: flex; gap: 12px; align-items: center; padding: 12px; cursor: pointer; }
    .member-thumb { width: 65px; height: 65px; min-width: 65px; border-radius: 50%; border: 2.5px solid var(--zen-gold); overflow: hidden; }
    .member-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .details { flex: 1; min-width: 0; }
    .tag { font-size: 9px; font-weight: 800; color: var(--zen-maroon); text-transform: uppercase; }
    .m-name { font-family: 'Playfair Display'; font-size: 1.1rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .m-data { font-size: 11px; color: #555; line-height: 1.4; margin-top: 2px; }

    .expanded-section { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: #fff; }
    .expanded-section.open { max-height: 550px; padding: 10px 15px 15px; border-top: 1px dashed #ddd; }
    .expanded-section img { width: 100%; max-width: 350px; display: block; margin: 0 auto 10px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .close-btn { font-size: 10px; font-weight: 800; text-align: center; color: var(--maroon); cursor: pointer; text-transform: uppercase; }

    .stats-bar { padding: 5px; font-size: 10px; background: var(--zen-blue); color: #fff; text-align: center; font-weight: 600; }

    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body oncontextmenu="return false;">

<div class="portal-wrapper">
    <div id="zenLoader">
        <div class="zen-spinner"></div>
        <div class="zen-text">ZEN - DNA</div>
    </div>

    <div class="portal-header">
        <button class="back-btn" id="backBtn" onclick="showHome()">BACK</button>
        <h2 id="portalTitle">ZALC Members Portal</h2>
        <div id="portalSubTitle"></div>
    </div>

    <div class="filter-bar">
        <div class="filter-grid">
            <div class="filter-item"><label>Search Directory</label><input type="text" id="searchBox" placeholder="Type name..." oninput="applyFilters()"></div>
            <div class="filter-item" id="yearFilterWrap"><label>Year</label><select id="filterYear" onchange="applyFilters()"><option value="">All</option></select></div>
        </div>
        <div class="detail-filters" id="detailFilters">
            <div class="filter-item"><label>Class</label><select id="filterClass" onchange="applyFilters()"><option value="">All</option></select></div>
            <div class="filter-item"><label>Position</label><select id="filterPos" onchange="applyFilters()"><option value="">All</option></select></div>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">Syncing Live Directory...</div>
    <div class="view-container" id="mainBody"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
// Security
document.addEventListener('keydown', e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) e.preventDefault(); });
document.addEventListener('keyup', e => { if (e.key == "PrintScreen") { navigator.clipboard.writeText(""); alert('Screenshots disabled.'); } });

const M_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVJQvFnPF1VyjviyayOG3_amxou7SLiM2KniqdxOAGy-GTySJtBgxWvlevoKa8zqd3UwT7dACQYm9I/pub?gid=0&single=true&output=csv";
const I_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVJQvFnPF1VyjviyayOG3_amxou7SLiM2KniqdxOAGy-GTySJtBgxWvlevoKa8zqd3UwT7dACQYm9I/pub?gid=635742688&single=true&output=csv";

let allMembers = [], associationInfo = [], currentView = 'home';

function getImg(u, sz='w600') {
    if(!u) return "";
    if(u.includes('static.wixstatic.com')) return u; 
    const m = u.match(/[-\w]{25,}/);
    return m ? `https://drive.google.com/thumbnail?id=${m[0]}&sz=${sz}` : u;
}

Promise.all([fetch(I_CSV).then(r => r.text()), fetch(M_CSV).then(r => r.text())]).then(([iCsv, mCsv]) => {
    associationInfo = Papa.parse(iCsv, {header:true}).data.filter(r => r["ZALC Name"]);
    associationInfo.sort((a, b) => b["Academic Year"].localeCompare(a["Academic Year"]));
    allMembers = Papa.parse(mCsv, {header:true}).data.filter(r => r.Name);
    const yrs = [...new Set(associationInfo.map(a => a["Academic Year"]))];
    yrs.forEach(y => document.getElementById("filterYear").innerHTML += `<option value="${y}">${y}</option>`);
    document.getElementById("zenLoader").style.display = "none";
    showHome();
});

function showHome() {
    currentView = 'home';
    document.getElementById("backBtn").style.display = 'none';
    document.getElementById("detailFilters").style.display = 'none';
    document.getElementById("yearFilterWrap").style.display = 'block';
    document.getElementById("portalTitle").innerText = "ZALC Members Portal";
    document.getElementById("portalSubTitle").style.display = 'none';
    document.getElementById("filterYear").value = "";
    document.getElementById("searchBox").value = "";
    applyFilters();
}

function openZalc(year) {
    currentView = 'detail';
    const info = associationInfo.find(a => a["Academic Year"] === year);
    document.getElementById("backBtn").style.display = 'block';
    document.getElementById("detailFilters").style.display = 'flex';
    document.getElementById("yearFilterWrap").style.display = 'none';
    document.getElementById("portalTitle").innerText = info["ZALC Name"];
    document.getElementById("portalSubTitle").innerText = info["Academic Year"];
    document.getElementById("portalSubTitle").style.display = 'block';
    const subset = allMembers.filter(m => m["Academic Year"] === year);
    const classes = [...new Set(subset.map(m => m.Class))].filter(Boolean);
    const pos = [...new Set(subset.map(m => m.Position))].filter(Boolean);
    document.getElementById("filterClass").innerHTML = '<option value="">All</option>' + classes.map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById("filterPos").innerHTML = '<option value="">All</option>' + pos.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById("filterYear").value = year;
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById("searchBox").value.toLowerCase();
    const yr = document.getElementById("filterYear").value;
    const body = document.getElementById("mainBody");
    body.innerHTML = "";
    
    if (currentView === 'home' && q === "" && yr === "") {
        renderGroups(associationInfo);
        document.getElementById("statsBar").innerText = `Available Directories: ${associationInfo.length}`;
    } else {
        const cls = document.getElementById("filterClass").value;
        const ps = document.getElementById("filterPos").value;
        const results = allMembers.filter(m => {
            const matchQ = m.Name.toLowerCase().includes(q) || (m["Academic Year"] && m["Academic Year"].toLowerCase().includes(q));
            const matchYr = !yr || m["Academic Year"] === yr;
            const matchCls = currentView === 'home' || !cls || m.Class === cls;
            const matchPs = currentView === 'home' || !ps || m.Position === ps;
            return matchQ && matchYr && matchCls && matchPs;
        });
        renderMembers(results, currentView === 'home' && q !== "");
        document.getElementById("statsBar").innerText = `Found ${results.length} Results`;
    }
}

function renderGroups(data) {
    const grid = document.createElement("div"); grid.className = "group-grid";
    data.forEach(a => {
        const card = document.createElement("div"); card.className = "group-card";
        card.onclick = () => openZalc(a["Academic Year"]);
        card.innerHTML = `<img src="${getImg(a["ZALC Logo"])}"><h3>${a["ZALC Name"]}</h3><p>${a["Academic Year"]}</p>`;
        grid.appendChild(card);
    });
    document.getElementById("mainBody").appendChild(grid);
}

function renderMembers(data, isGlobal) {
    data.forEach((m, i) => {
        const zInfo = associationInfo.find(a => a["Academic Year"] === m["Academic Year"]) || { "ZALC Name": "ZALC" };
        const container = document.createElement("div"); container.className = "member-item-container";
        const classLine = m.Class ? `<div>${m.Class}</div>` : "";
        const deptLine = m["Dept No"] ? `<div><b>Dept No:</b> ${m["Dept No"]}</div>` : "";
        const posLine = m.Position ? `<div><b>Position:</b> ${m.Position}</div>` : "";

        container.innerHTML = `
            <div class="member-main-card" onclick="${isGlobal ? `openZalc('${m["Academic Year"]}')` : `toggleSection(${i})`}">
                <div class="member-thumb"><img src="${getImg(m["Photo URL"], 'w200')}" onmousedown="return false;"></div>
                <div class="details">
                    <div class="tag">${zInfo["ZALC Name"]} | ${m["Academic Year"]}</div>
                    <div class="m-name">${m.Name}</div>
                    <div class="m-data">${classLine}${deptLine}${posLine}</div>
                </div>
            </div>
            <div id="sec-${i}" class="expanded-section">
                <img src="${getImg(m["Photo URL"], 'w800')}" onmousedown="return false;">
                <div class="close-btn" onclick="toggleSection(${i})">▲ Close Preview</div>
            </div>
        `;
        document.getElementById("mainBody").appendChild(container);
    });
}

function toggleSection(i) {
    const el = document.getElementById(`sec-${i}`);
    el.classList.toggle("open");
    if(el.classList.contains("open")) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
</script>
</body>
</html>
